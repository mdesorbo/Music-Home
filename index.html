<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎼 Music Coordinator Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a2f45;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e8eaf6;
    --muted: #6b7280;
    --high: #f87171;
    --high-bg: rgba(248,113,113,0.12);
    --mid: #fbbf24;
    --mid-bg: rgba(251,191,36,0.12);
    --low: #34d399;
    --low-bg: rgba(52,211,153,0.12);
    --cat1: #818cf8; /* concerts */
    --cat2: #38bdf8; /* budget */
    --cat3: #fbbf24; /* scheduling */
    --cat4: #34d399; /* maintenance */
    --cat5: #f472b6; /* bus */
    --cat6: #94a3b8; /* other */
    --radius: 12px;
    --sidebar: 220px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .logo {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-icon { font-size: 28px; margin-bottom: 4px; }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--text);
    line-height: 1.2;
  }
  .logo-sub { font-size: 11px; color: var(--muted); }

  .new-btn {
    margin: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }
  .new-btn:hover { opacity: 0.88; }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    padding: 0 12px 12px;
  }
  .stat {
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }
  .stat-val { font-size: 18px; font-weight: 700; }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .nav-section { padding: 0 12px 8px; }
  .nav-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .nav-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; border: none; background: transparent;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    transition: all 0.15s; text-align: left; margin-bottom: 2px;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: rgba(108,99,255,0.2); color: var(--accent2); }
  .nav-btn .icon { font-size: 15px; }

  .filter-section { padding: 0 12px 8px; }
  .filter-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 7px 10px;
    font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer;
    margin-bottom: 6px;
  }
  .filter-select:focus { outline: none; border-color: var(--accent); }

  .cat-legend { padding: 0 12px 12px; }
  .cat-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 11px; color: var(--muted); }

  .sidebar-footer {
    margin-top: auto; padding: 12px;
    font-size: 10px; color: var(--muted);
    border-top: 1px solid var(--border); line-height: 1.5;
  }

  /* ── MAIN ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  #search {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 12px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; width: 220px;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { outline: none; border-color: var(--accent); }
  .spacer { flex: 1; }
  .view-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 3px; }
  .view-tab {
    background: none; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active { background: var(--accent); color: white; }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.88; }

  #content { flex: 1; overflow-y: auto; padding: 20px; }

  /* ── VIEW HEADERS ── */
  .view-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  }
  .view-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--text); flex: 1;
  }
  .nav-arrow {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 6px 12px;
    cursor: pointer; font-size: 14px; transition: background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-arrow:hover { background: var(--border); }
  .today-link {
    font-size: 12px; color: var(--accent2); cursor: pointer;
    background: none; border: none; font-family: 'DM Sans', sans-serif;
  }
  .today-link:hover { text-decoration: underline; }

  /* ── DAY VIEW ── */
  .day-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .day-empty .big-icon { font-size: 50px; margin-bottom: 12px; }

  /* ── WEEK GRID ── */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .week-day {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 8px; min-height: 140px;
    display: flex; flex-direction: column;
  }
  .week-day.today { border-color: var(--accent); background: rgba(108,99,255,0.07); }
  .week-day-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
  .week-day-num { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .week-day.today .week-day-num { color: var(--accent2); }
  .week-tasks { flex: 1; }
  .week-add { font-size: 11px; color: var(--muted); text-align: center; cursor: pointer; margin-top: 4px; background: none; border: none; width: 100%; }
  .week-add:hover { color: var(--accent2); }

  /* ── MONTH GRID ── */
  .month-grid-header { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 4px; }
  .month-dow { text-align: center; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 4px; }
  .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .month-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px; min-height: 88px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .month-cell:hover { border-color: var(--accent); }
  .month-cell.today { border-color: var(--accent); background: rgba(108,99,255,0.07); }
  .month-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .month-num { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 3px; }
  .month-cell.today .month-num { color: var(--accent2); }

  /* ── TASK PILLS ── */
  .task-pill {
    font-size: 10px; font-weight: 500; color: white;
    border-radius: 4px; padding: 2px 5px; margin-bottom: 2px;
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: opacity 0.15s;
  }
  .task-pill:hover { opacity: 0.82; }
  .task-pill.done { opacity: 0.45; text-decoration: line-through; }

  /* ── TASK CARDS ── */
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; cursor: pointer;
    transition: border-color 0.15s, transform 0.15s; margin-bottom: 8px;
    border-left-width: 4px;
  }
  .task-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .task-card.done { opacity: 0.5; }
  .tc-top { display: flex; align-items: flex-start; gap: 10px; }
  .tc-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.4; }
  .pri-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .tc-meta { display: flex; align-items: center; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
  .tc-meta span { font-size: 11px; color: var(--muted); }
  .tc-details { font-size: 12px; color: var(--muted); margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .progress-ring { flex-shrink: 0; }

  /* ── YEAR VIEW ── */
  .year-empty { text-align: center; padding: 60px; color: var(--muted); }

  /* ── MODAL ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 16px;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; }
  .modal-close {
    background: var(--surface2); border: none; color: var(--muted);
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field textarea { resize: none; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .steps-list { margin-top: 6px; }
  .step-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .step-item input[type=checkbox] { accent-color: var(--accent); }
  .step-text { flex: 1; font-size: 13px; }
  .step-text.done { text-decoration: line-through; color: var(--muted); }
  .step-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; opacity: 0; }
  .step-item:hover .step-del { opacity: 1; }
  .step-add-row { display: flex; gap: 6px; margin-top: 8px; }
  .step-add-row input { flex: 1; }
  .step-add-btn {
    background: var(--accent); color: white; border: none; border-radius: 8px;
    padding: 9px 14px; font-size: 14px; cursor: pointer;
  }
  .modal-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-top: 1px solid var(--border);
    background: var(--surface2); border-radius: 0 0 18px 18px;
  }
  .footer-left { display: flex; gap: 8px; }
  .footer-right { display: flex; gap: 8px; }
  .btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: opacity 0.15s; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { color: var(--text); }
  .btn-danger { background: var(--high-bg); color: var(--high); border: 1px solid rgba(248,113,113,0.2); }
  .btn-gmail { background: rgba(66,133,244,0.15); color: #60a5fa; border: 1px solid rgba(66,133,244,0.25); }
  .btn-gmail:hover { background: rgba(66,133,244,0.25); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:hover { opacity: 0.88; }
  .completed-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .completed-toggle input { accent-color: var(--accent); width: 15px; height: 15px; }
  .completed-toggle span { font-size: 13px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">🎼</div>
    <div class="logo-title">Music Dept</div>
    <div class="logo-sub">Coordinator Hub</div>
  </div>
  <button class="new-btn" onclick="openModal()">+ New Task</button>
  <div class="stat-row">
    <div class="stat"><div class="stat-val" id="stat-pending" style="color:var(--accent2)">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-val" id="stat-high" style="color:var(--high)">0</div><div class="stat-label">High Pri</div></div>
    <div class="stat"><div class="stat-val" id="stat-overdue" style="color:var(--mid)">0</div><div class="stat-label">Overdue</div></div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Views</div>
    <button class="nav-btn" onclick="setView('Day')" id="nav-Day"><span class="icon">📅</span> Day View</button>
    <button class="nav-btn active" onclick="setView('Week')" id="nav-Week"><span class="icon">🗓</span> Week View</button>
    <button class="nav-btn" onclick="setView('Month')" id="nav-Month"><span class="icon">📆</span> Month View</button>
    <button class="nav-btn" onclick="setView('Year')" id="nav-Year"><span class="icon">📋</span> All Tasks</button>
  </div>
  <div class="filter-section">
    <div class="nav-label">Filters</div>
    <select class="filter-select" id="filter-priority" onchange="renderView()">
      <option value="all">All Priorities</option>
      <option value="high">High</option>
      <option value="mid">Mid</option>
      <option value="low">Low</option>
    </select>
    <select class="filter-select" id="filter-category" onchange="renderView()">
      <option value="all">All Categories</option>
      <option value="concerts">Concerts & Events</option>
      <option value="budget">Budget & Purchasing</option>
      <option value="scheduling">Scheduling & Rehearsals</option>
      <option value="maintenance">Instrument Maintenance</option>
      <option value="bus">Bus Requests</option>
      <option value="other">Other</option>
    </select>
    <select class="filter-select" id="filter-status" onchange="renderView()">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="done">Completed</option>
    </select>
  </div>
  <div class="cat-legend">
    <div class="nav-label">Categories</div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat1)"></div><div class="cat-name">Concerts & Events</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat2)"></div><div class="cat-name">Budget & Purchasing</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat3)"></div><div class="cat-name">Scheduling & Rehearsals</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat4)"></div><div class="cat-name">Instrument Maintenance</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat5)"></div><div class="cat-name">Bus Requests</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat6)"></div><div class="cat-name">Other</div></div>
  </div>
  <div class="sidebar-footer">District K-12<br>Music Coordinator</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <input id="search" type="text" placeholder="🔍  Search tasks..." oninput="renderView()"/>
    <div class="spacer"></div>
    <div class="view-tabs">
      <button class="view-tab" onclick="setView('Day')" id="tab-Day">Day</button>
      <button class="view-tab active" onclick="setView('Week')" id="tab-Week">Week</button>
      <button class="view-tab" onclick="setView('Month')" id="tab-Month">Month</button>
      <button class="view-tab" onclick="setView('Year')" id="tab-Year">All Tasks</button>
    </div>
    <button class="add-btn" onclick="openModal()">+ New Task</button>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Task</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Task Title *</label>
        <input id="f-title" placeholder="e.g. Submit bus request for Spring Concert"/>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Due Date</label>
          <input id="f-due" type="date"/>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="f-priority">
            <option value="high">🔴 High</option>
            <option value="mid" selected>🟡 Mid</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="f-category">
          <option value="concerts">🎭 Concerts & Events</option>
          <option value="budget">💰 Budget & Purchasing</option>
          <option value="scheduling">📅 Scheduling & Rehearsals</option>
          <option value="maintenance">🎸 Instrument Maintenance</option>
          <option value="bus">🚌 Bus Requests</option>
          <option value="other">📌 Other</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Assigned To</label>
          <input id="f-assignee" placeholder="Name"/>
        </div>
        <div class="field">
          <label>Their Email</label>
          <input id="f-email" type="email" placeholder="email@district.org"/>
        </div>
      </div>
      <div class="field">
        <label>Details / Notes</label>
        <textarea id="f-details" rows="3" placeholder="Add notes, requirements, or context..."></textarea>
      </div>
      <div class="field">
        <label>Sub-Steps / Checklist</label>
        <div class="steps-list" id="steps-list"></div>
        <div class="step-add-row">
          <input id="step-input" placeholder="Add a step (press Enter)" onkeydown="if(event.key==='Enter')addStep()"/>
          <button class="step-add-btn" onclick="addStep()">+</button>
        </div>
      </div>
      <label class="completed-toggle">
        <input type="checkbox" id="f-completed"/>
        <span>Mark as Completed</span>
      </label>
    </div>
    <div class="modal-footer">
      <div class="footer-left" id="modal-footer-left"></div>
      <div class="footer-right">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ───────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'music_coord_v3';
let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentView = 'Week';
let currentDate = new Date();
let editingId = null;
let modalSteps = [];

const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
const uuid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const todayStr = () => new Date().toISOString().slice(0,10);
const fmt = d => { if(!d) return ''; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };

const CATS = {
  concerts:    { label:'Concerts & Events',       color:'var(--cat1)', hex:'#818cf8' },
  budget:      { label:'Budget & Purchasing',      color:'var(--cat2)', hex:'#38bdf8' },
  scheduling:  { label:'Scheduling & Rehearsals',  color:'var(--cat3)', hex:'#fbbf24' },
  maintenance: { label:'Instrument Maintenance',   color:'var(--cat4)', hex:'#34d399' },
  bus:         { label:'Bus Requests',             color:'var(--cat5)', hex:'#f472b6' },
  other:       { label:'Other',                    color:'var(--cat6)', hex:'#94a3b8' },
};
const PRIS = {
  high: { label:'High', color:'var(--high)', bg:'var(--high-bg)' },
  mid:  { label:'Mid',  color:'var(--mid)',  bg:'var(--mid-bg)'  },
  low:  { label:'Low',  color:'var(--low)',  bg:'var(--low-bg)'  },
};
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ── FILTERS ────────────────────────────────────────────────────────────────────
const getFiltered = () => {
  const fp = document.getElementById('filter-priority').value;
  const fc = document.getElementById('filter-category').value;
  const fs = document.getElementById('filter-status').value;
  const q  = document.getElementById('search').value.toLowerCase();
  return tasks.filter(t => {
    if (fp !== 'all' && t.priority !== fp) return false;
    if (fc !== 'all' && t.category !== fc) return false;
    if (fs === 'pending' && t.completed) return false;
    if (fs === 'done' && !t.completed) return false;
    if (q && !t.title.toLowerCase().includes(q)) return false;
    return true;
  });
};

// ── STATS ──────────────────────────────────────────────────────────────────────
const updateStats = () => {
  const td = todayStr();
  document.getElementById('stat-pending').textContent  = tasks.filter(t=>!t.completed).length;
  document.getElementById('stat-high').textContent     = tasks.filter(t=>!t.completed&&t.priority==='high').length;
  document.getElementById('stat-overdue').textContent  = tasks.filter(t=>!t.completed&&t.dueDate&&t.dueDate<td).length;
};

// ── VIEW SWITCHING ─────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  ['Day','Week','Month','Year'].forEach(x => {
    document.getElementById('nav-'+x).classList.toggle('active', x===v);
    document.getElementById('tab-'+x).classList.toggle('active', x===v);
  });
  renderView();
}

function renderView() {
  updateStats();
  const el = document.getElementById('content');
  if (currentView==='Day')   el.innerHTML = renderDay();
  if (currentView==='Week')  el.innerHTML = renderWeek();
  if (currentView==='Month') el.innerHTML = renderMonth();
  if (currentView==='Year')  el.innerHTML = renderYear();
}

// ── PILL HTML ──────────────────────────────────────────────────────────────────
const pillHtml = (t) => {
  const hex = CATS[t.category]?.hex || '#94a3b8';
  return `<div class="task-pill${t.completed?' done':''}" style="background:${hex}" onclick="event.stopPropagation();openModal('${t.id}')">${t.completed?'✓ ':''}${esc(t.title)}</div>`;
};

// ── CARD HTML ──────────────────────────────────────────────────────────────────
const cardHtml = (t) => {
  const cat = CATS[t.category]||CATS.other;
  const pri = PRIS[t.priority]||PRIS.mid;
  const done = (t.steps||[]).filter(s=>s.done).length;
  const total = (t.steps||[]).length;
  const pct = total ? Math.round(done/total*100) : null;
  return `<div class="task-card${t.completed?' done':''}" style="border-left-color:${cat.hex}" onclick="openModal('${t.id}')">
    <div class="tc-top">
      <div class="tc-title">${t.completed?'✓ ':''}${esc(t.title)}</div>
      <div class="pri-badge" style="color:${pri.color};background:${pri.bg}">${pri.label}</div>
      ${pct!==null?`<div style="font-size:11px;font-weight:700;color:${pct===100?'var(--low)':'var(--muted)'};background:var(--surface2);padding:4px 8px;border-radius:20px;flex-shrink:0">${pct}%</div>`:''}
    </div>
    <div class="tc-meta">
      <span style="color:${cat.hex}">${cat.label}</span>
      ${t.assignee?`<span>👤 ${esc(t.assignee)}</span>`:''}
      ${t.dueDate?`<span>📅 ${fmt(t.dueDate)}</span>`:''}
      ${total?`<span>☑ ${done}/${total}</span>`:''}
    </div>
    ${t.details?`<div class="tc-details">${esc(t.details)}</div>`:''}
  </div>`;
};

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── DAY VIEW ───────────────────────────────────────────────────────────────────
function renderDay() {
  const ds = currentDate.toISOString().slice(0,10);
  const label = currentDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const ft = getFiltered().filter(t=>t.dueDate===ds).sort((a,b)=>(['high','mid','low'].indexOf(a.priority))-(['high','mid','low'].indexOf(b.priority)));
  const tasksHtml = ft.length
    ? ft.map(cardHtml).join('') + `<div style="border:2px dashed var(--border);border-radius:12px;padding:14px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px" onclick="openModal(null,'${ds}')">+ Add Task for This Day</div>`
    : `<div class="day-empty"><div class="big-icon">🎵</div><p>No tasks due today</p><button class="add-btn" style="margin-top:16px" onclick="openModal(null,'${ds}')">+ Add Task</button></div>`;
  return `<div class="view-header">
    <button class="nav-arrow" onclick="shiftDate(-1)">‹ Prev</button>
    <div class="view-title">${label}</div>
    <button class="nav-arrow" onclick="shiftDate(1)">Next ›</button>
    <button class="today-link" onclick="currentDate=new Date();renderView()">Today</button>
  </div><div style="max-width:680px">${tasksHtml}</div>`;
}

// ── WEEK VIEW ──────────────────────────────────────────────────────────────────
function renderWeek() {
  const start = new Date(currentDate);
  start.setDate(currentDate.getDate()-currentDate.getDay());
  const days = Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});
  const td = todayStr();
  const label = `Week of ${days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  const ft = getFiltered();
  const cells = days.map(d=>{
    const ds = d.toISOString().slice(0,10);
    const dt = ft.filter(t=>t.dueDate===ds);
    return `<div class="week-day${ds===td?' today':''}">
      <div class="week-day-name">${DAYS[d.getDay()]}</div>
      <div class="week-day-num">${d.getDate()}</div>
      <div class="week-tasks">${dt.map(pillHtml).join('')}</div>
      <button class="week-add" onclick="openModal(null,'${ds}')">+</button>
    </div>`;
  }).join('');
  return `<div class="view-header">
    <button class="nav-arrow" onclick="shiftDate(-7)">‹ Prev</button>
    <div class="view-title">${label}</div>
    <button class="nav-arrow" onclick="shiftDate(7)">Next ›</button>
    <button class="today-link" onclick="currentDate=new Date();renderView()">This Week</button>
  </div><div class="week-grid">${cells}</div>`;
}

// ── MONTH VIEW ─────────────────────────────────────────────────────────────────
function renderMonth() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  const first = new Date(y,m,1).getDay();
  const total = new Date(y,m+1,0).getDate();
  const td = todayStr();
  const label = new Date(y,m).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const ft = getFiltered();
  let cells = '';
  for(let i=0;i<first;i++) cells+=`<div class="month-cell empty"></div>`;
  for(let d=1;d<=total;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=ft.filter(t=>t.dueDate===ds);
    const more=dt.length>3?`<div style="font-size:9px;color:var(--muted)">+${dt.length-3} more</div>`:'';
    cells+=`<div class="month-cell${ds===td?' today':''}" onclick="openModal(null,'${ds}')">
      <div class="month-num">${d}</div>
      ${dt.slice(0,3).map(t=>`<div class="task-pill${t.completed?' done':''}" style="background:${CATS[t.category]?.hex||'#94a3b8'}" onclick="event.stopPropagation();openModal('${t.id}')">${esc(t.title)}</div>`).join('')}
      ${more}
    </div>`;
  }
  return `<div class="view-header">
    <button class="nav-arrow" onclick="shiftMonth(-1)">‹</button>
    <div class="view-title">${label}</div>
    <button class="nav-arrow" onclick="shiftMonth(1)">›</button>
    <button class="today-link" onclick="currentDate=new Date();renderView()">Today</button>
  </div>
  <div class="month-grid-header">${DAYS.map(d=>`<div class="month-dow">${d}</div>`).join('')}</div>
  <div class="month-grid">${cells}</div>`;
}

// ── YEAR/ALL VIEW ──────────────────────────────────────────────────────────────
function renderYear() {
  const ft = getFiltered().sort((a,b)=>{
    if(!a.dueDate) return 1; if(!b.dueDate) return -1;
    return a.dueDate.localeCompare(b.dueDate);
  });
  const count = `<span style="font-size:14px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400"> — ${ft.length} tasks</span>`;
  return `<div class="view-header"><div class="view-title">All Tasks${count}</div></div>
  <div style="max-width:720px">${ft.length?ft.map(cardHtml).join(''):`<div class="year-empty"><div style="font-size:48px;margin-bottom:12px">📋</div><p>No tasks match your filters</p></div>`}</div>`;
}

// ── DATE NAVIGATION ────────────────────────────────────────────────────────────
function shiftDate(n) { currentDate.setDate(currentDate.getDate()+n); renderView(); }
function shiftMonth(n) { currentDate.setMonth(currentDate.getMonth()+n); renderView(); }

// ── MODAL ──────────────────────────────────────────────────────────────────────
function openModal(id, prefillDate) {
  editingId = id || null;
  modalSteps = [];
  const t = id ? tasks.find(x=>x.id===id) : null;
  document.getElementById('modal-title').textContent = t ? 'Edit Task' : 'New Task';
  document.getElementById('f-title').value      = t?.title || '';
  document.getElementById('f-due').value         = t?.dueDate || prefillDate || todayStr();
  document.getElementById('f-priority').value    = t?.priority || 'mid';
  document.getElementById('f-category').value    = t?.category || 'other';
  document.getElementById('f-assignee').value    = t?.assignee || '';
  document.getElementById('f-email').value       = t?.assigneeEmail || '';
  document.getElementById('f-details').value     = t?.details || '';
  document.getElementById('f-completed').checked = t?.completed || false;
  modalSteps = (t?.steps||[]).map(s=>({...s}));
  renderSteps();
  const fl = document.getElementById('modal-footer-left');
  if (t) {
    fl.innerHTML = `<button class="btn btn-danger" onclick="deleteTask()">Delete</button>
      <a class="btn btn-gmail" href="${gmailLink(t)}" target="_blank" style="text-decoration:none">📧 Send Reminder</a>`;
  } else { fl.innerHTML = ''; }
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function overlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function renderSteps() {
  const el = document.getElementById('steps-list');
  el.innerHTML = modalSteps.map((s,i)=>`
    <div class="step-item">
      <input type="checkbox" ${s.done?'checked':''} onchange="modalSteps[${i}].done=this.checked"/>
      <span class="step-text${s.done?' done':''}">${esc(s.text)}</span>
      <button class="step-del" onclick="modalSteps.splice(${i},1);renderSteps()">✕</button>
    </div>`).join('');
}

function addStep() {
  const inp = document.getElementById('step-input');
  if (!inp.value.trim()) return;
  modalSteps.push({id:uuid(), text:inp.value.trim(), done:false});
  inp.value = '';
  renderSteps();
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Task title is required.'); return; }
  const t = {
    id: editingId || uuid(),
    title,
    dueDate:       document.getElementById('f-due').value,
    priority:      document.getElementById('f-priority').value,
    category:      document.getElementById('f-category').value,
    assignee:      document.getElementById('f-assignee').value.trim(),
    assigneeEmail: document.getElementById('f-email').value.trim(),
    details:       document.getElementById('f-details').value.trim(),
    completed:     document.getElementById('f-completed').checked,
    steps:         modalSteps,
  };
  if (editingId) { tasks = tasks.map(x=>x.id===editingId?t:x); }
  else { tasks.push(t); }
  save(); closeModal(); renderView();
}

function deleteTask() {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(x=>x.id!==editingId);
  save(); closeModal(); renderView();
}

// ── GMAIL ──────────────────────────────────────────────────────────────────────
function gmailLink(t) {
  const cat = CATS[t.category]?.label||t.category;
  const pri = PRIS[t.priority]?.label||t.priority;
  const sub = encodeURIComponent(`Reminder: ${t.title} — Due ${fmt(t.dueDate)}`);
  const body = encodeURIComponent([
    `Hi${t.assignee?' '+t.assignee:''},`,``,
    `This is a reminder about the following task:`,``,
    `📋 Task: ${t.title}`,
    `📅 Due Date: ${fmt(t.dueDate)}`,
    `🏷️ Category: ${cat}`,
    `⚡ Priority: ${pri.toUpperCase()}`,``,
    t.details?`Details:\n${t.details}`:''``,
    `Please ensure this is completed on time.`,``,
    `— Music Department Coordinator`,
  ].join('\n'));
  const to = encodeURIComponent(t.assigneeEmail||'');
  return `https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${sub}&body=${body}`;
}

// ── KEYBOARD ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='n' && !document.getElementById('modal-overlay').classList.contains('open') && document.activeElement.tagName!=='INPUT') openModal();
});

// ── INIT ───────────────────────────────────────────────────────────────────────
renderView();
</script>
</body>
</html>
