<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎼 Music Coordinator Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1e2333; --border: #2a2f45;
    --accent: #6c63ff; --accent2: #a78bfa; --text: #e8eaf6; --muted: #6b7280;
    --high: #f87171; --high-bg: rgba(248,113,113,0.12);
    --mid: #fbbf24;  --mid-bg: rgba(251,191,36,0.12);
    --low: #34d399;  --low-bg: rgba(52,211,153,0.12);
    --cat1:#818cf8; --cat2:#38bdf8; --cat3:#fbbf24; --cat4:#34d399; --cat5:#f472b6; --cat6:#94a3b8;
    --radius:12px; --sidebar:220px;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* SIDEBAR */
  #sidebar { width:var(--sidebar); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
  .logo { padding:20px 16px 16px; border-bottom:1px solid var(--border); }
  .logo-icon { font-size:28px; margin-bottom:4px; }
  .logo-title { font-family:'Playfair Display',serif; font-size:15px; color:var(--text); line-height:1.2; }
  .logo-sub { font-size:11px; color:var(--muted); }
  .new-btn { margin:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border:none; border-radius:var(--radius); padding:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; width:calc(100% - 24px); }
  .new-btn:hover { opacity:0.88; }
  .stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; padding:0 12px 12px; }
  .stat { background:var(--surface2); border-radius:8px; padding:8px 4px; text-align:center; }
  .stat-val { font-size:18px; font-weight:700; }
  .stat-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
  .nav-section { padding:0 12px 8px; }
  .nav-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .nav-btn { display:flex; align-items:center; gap:8px; width:100%; border:none; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; padding:8px 10px; border-radius:8px; cursor:pointer; transition:all 0.15s; text-align:left; margin-bottom:2px; }
  .nav-btn:hover { background:var(--surface2); color:var(--text); }
  .nav-btn.active { background:rgba(108,99,255,0.2); color:var(--accent2); }
  .filter-section { padding:0 12px 8px; }
  .filter-select { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:7px 10px; font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; margin-bottom:6px; }
  .filter-select:focus { outline:none; border-color:var(--accent); }
  .cat-legend { padding:0 12px 12px; }
  .cat-item { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
  .cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .cat-name { font-size:11px; color:var(--muted); }
  .sidebar-footer { margin-top:auto; padding:12px; font-size:10px; color:var(--muted); border-top:1px solid var(--border); line-height:1.5; }

  /* MAIN */
  #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #topbar { display:flex; align-items:center; gap:10px; padding:12px 20px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  #search { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 12px; font-size:13px; font-family:'DM Sans',sans-serif; width:220px; }
  #search::placeholder { color:var(--muted); }
  #search:focus { outline:none; border-color:var(--accent); }
  .spacer { flex:1; }
  .view-tabs { display:flex; gap:4px; background:var(--surface2); border-radius:8px; padding:3px; }
  .view-tab { background:none; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; padding:6px 14px; border-radius:6px; cursor:pointer; transition:all 0.15s; }
  .view-tab:hover { color:var(--text); }
  .view-tab.active { background:var(--accent); color:white; }
  .add-btn { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border:none; border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
  #content { flex:1; overflow-y:auto; padding:20px; }

  /* VIEW HEADERS */
  .view-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .view-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--text); flex:1; }
  .nav-arrow { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:14px; font-family:'DM Sans',sans-serif; }
  .nav-arrow:hover { background:var(--border); }
  .today-link { font-size:12px; color:var(--accent2); cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; text-decoration:underline; }

  /* WEEK */
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
  .week-day { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 8px; min-height:140px; display:flex; flex-direction:column; }
  .week-day.today { border-color:var(--accent); background:rgba(108,99,255,0.07); }
  .week-day-name { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; text-align:center; }
  .week-day-num { font-size:20px; font-weight:700; text-align:center; margin-bottom:6px; }
  .week-day.today .week-day-num { color:var(--accent2); }
  .week-tasks { flex:1; }
  .week-add { font-size:18px; color:var(--muted); text-align:center; cursor:pointer; margin-top:4px; background:none; border:none; width:100%; line-height:1; }
  .week-add:hover { color:var(--accent2); }

  /* MONTH */
  .month-grid-header { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px; }
  .month-dow { text-align:center; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; padding:4px; }
  .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .month-cell { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px; min-height:88px; cursor:pointer; }
  .month-cell:hover { border-color:var(--accent); }
  .month-cell.today { border-color:var(--accent); background:rgba(108,99,255,0.07); }
  .month-cell.empty { background:transparent; border-color:transparent; cursor:default; pointer-events:none; }
  .month-num { font-size:12px; font-weight:600; color:var(--muted); margin-bottom:3px; }
  .month-cell.today .month-num { color:var(--accent2); }

  /* TASK PILLS */
  .task-pill { font-size:10px; font-weight:500; color:white; border-radius:4px; padding:2px 5px; margin-bottom:2px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; border:none; width:100%; text-align:left; }
  .task-pill:hover { filter:brightness(1.15); }
  .task-pill.done { opacity:0.45; text-decoration:line-through; }

  /* TASK CARDS */
  .task-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; cursor:pointer; transition:border-color 0.15s,transform 0.15s; margin-bottom:8px; border-left-width:4px; display:block; width:100%; text-align:left; font-family:'DM Sans',sans-serif; color:var(--text); }
  .task-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .task-card.done { opacity:0.5; }
  .tc-top { display:flex; align-items:flex-start; gap:10px; }
  .tc-title { font-size:14px; font-weight:600; color:var(--text); flex:1; line-height:1.4; }
  .pri-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px; flex-shrink:0; }
  .pct-badge { font-size:11px; font-weight:700; padding:4px 8px; border-radius:20px; flex-shrink:0; background:var(--surface2); }
  .tc-meta { display:flex; align-items:center; gap:12px; margin-top:6px; flex-wrap:wrap; }
  .tc-meta span { font-size:11px; color:var(--muted); }
  .tc-details { font-size:12px; color:var(--muted); margin-top:6px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .day-empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .day-empty .big-icon { font-size:50px; margin-bottom:12px; }
  .add-day-btn { border:2px dashed var(--border); border-radius:12px; padding:14px; text-align:center; color:var(--muted); font-size:13px; cursor:pointer; margin-top:4px; background:none; width:100%; font-family:'DM Sans',sans-serif; }
  .add-day-btn:hover { border-color:var(--accent); color:var(--accent2); }
  .year-empty { text-align:center; padding:60px; color:var(--muted); }

  /* MODAL */
  #modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.65); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:16px; }
  #modal-overlay.open { display:flex; }
  #modal { background:var(--surface); border:1px solid var(--border); border-radius:18px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 80px rgba(0,0,0,0.6); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--border); }
  .modal-title { font-family:'Playfair Display',serif; font-size:18px; }
  .modal-close { background:var(--surface2); border:none; color:var(--muted); width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:14px; }
  .modal-close:hover { color:var(--text); }
  .modal-body { padding:20px 24px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:5px; }
  .field input, .field select, .field textarea { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 12px; font-size:13px; font-family:'DM Sans',sans-serif; }
  .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--accent); }
  .field textarea { resize:none; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .steps-list { margin-top:6px; }
  .step-item { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border); }
  .step-item input[type=checkbox] { accent-color:var(--accent); cursor:pointer; }
  .step-text { flex:1; font-size:13px; cursor:default; }
  .step-text.done { text-decoration:line-through; color:var(--muted); }
  .step-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:0 4px; }
  .step-del:hover { color:var(--high); }
  .step-add-row { display:flex; gap:6px; margin-top:8px; }
  .step-add-row input { flex:1; }
  .step-add-btn { background:var(--accent); color:white; border:none; border-radius:8px; padding:9px 14px; font-size:16px; cursor:pointer; }
  .modal-footer { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-top:1px solid var(--border); background:var(--surface2); border-radius:0 0 18px 18px; flex-wrap:wrap; gap:8px; }
  .footer-left { display:flex; gap:8px; flex-wrap:wrap; }
  .footer-right { display:flex; gap:8px; }
  .btn { padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; border:none; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { color:var(--text); }
  .btn-danger { background:var(--high-bg); color:var(--high); border:1px solid rgba(248,113,113,0.2); }
  .btn-gmail { background:rgba(66,133,244,0.15); color:#60a5fa; border:1px solid rgba(66,133,244,0.25); text-decoration:none; display:inline-block; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; }
  .completed-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; }
  .completed-toggle input { accent-color:var(--accent); width:15px; height:15px; cursor:pointer; }
  .completed-toggle span { font-size:13px; }
  option { background:#1e2333; color:#e8eaf6; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">🎼</div>
    <div class="logo-title">Music Dept</div>
    <div class="logo-sub">Coordinator Hub</div>
  </div>
  <button class="new-btn" id="btn-new-sidebar">+ New Task</button>
  <div class="stat-row">
    <div class="stat"><div class="stat-val" id="stat-pending" style="color:var(--accent2)">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-val" id="stat-high" style="color:var(--high)">0</div><div class="stat-label">High Pri</div></div>
    <div class="stat"><div class="stat-val" id="stat-overdue" style="color:var(--mid)">0</div><div class="stat-label">Overdue</div></div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Views</div>
    <button class="nav-btn" id="nav-Day"><span>📅</span> Day View</button>
    <button class="nav-btn active" id="nav-Week"><span>🗓</span> Week View</button>
    <button class="nav-btn" id="nav-Month"><span>📆</span> Month View</button>
    <button class="nav-btn" id="nav-Year"><span>📋</span> All Tasks</button>
  </div>
  <div class="filter-section">
    <div class="nav-label">Filters</div>
    <select class="filter-select" id="filter-priority">
      <option value="all">All Priorities</option>
      <option value="high">High</option>
      <option value="mid">Mid</option>
      <option value="low">Low</option>
    </select>
    <select class="filter-select" id="filter-category">
      <option value="all">All Categories</option>
      <option value="concerts">Concerts &amp; Events</option>
      <option value="budget">Budget &amp; Purchasing</option>
      <option value="scheduling">Scheduling &amp; Rehearsals</option>
      <option value="maintenance">Instrument Maintenance</option>
      <option value="bus">Bus Requests</option>
      <option value="other">Other</option>
    </select>
    <select class="filter-select" id="filter-status">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="done">Completed</option>
    </select>
  </div>
  <div class="cat-legend">
    <div class="nav-label">Categories</div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat1)"></div><div class="cat-name">Concerts &amp; Events</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat2)"></div><div class="cat-name">Budget &amp; Purchasing</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat3)"></div><div class="cat-name">Scheduling &amp; Rehearsals</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat4)"></div><div class="cat-name">Instrument Maintenance</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat5)"></div><div class="cat-name">Bus Requests</div></div>
    <div class="cat-item"><div class="cat-dot" style="background:var(--cat6)"></div><div class="cat-name">Other</div></div>
  </div>
  <div class="sidebar-footer">District K-12<br>Music Coordinator</div>
</div>

<div id="main">
  <div id="topbar">
    <input id="search" type="text" placeholder="🔍  Search tasks..."/>
    <div class="spacer"></div>
    <div class="view-tabs">
      <button class="view-tab" id="tab-Day">Day</button>
      <button class="view-tab active" id="tab-Week">Week</button>
      <button class="view-tab" id="tab-Month">Month</button>
      <button class="view-tab" id="tab-Year">All Tasks</button>
    </div>
    <button class="add-btn" id="btn-new-top">+ New Task</button>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Task</div>
      <button class="modal-close" id="btn-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Task Title *</label>
        <input id="f-title" placeholder="e.g. Submit bus request for Spring Concert"/>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Due Date</label>
          <input id="f-due" type="date"/>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="f-priority">
            <option value="high">🔴 High</option>
            <option value="mid" selected>🟡 Mid</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="f-category">
          <option value="concerts">🎭 Concerts &amp; Events</option>
          <option value="budget">💰 Budget &amp; Purchasing</option>
          <option value="scheduling">📅 Scheduling &amp; Rehearsals</option>
          <option value="maintenance">🎸 Instrument Maintenance</option>
          <option value="bus">🚌 Bus Requests</option>
          <option value="other">📌 Other</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Assigned To</label>
          <input id="f-assignee" placeholder="Name"/>
        </div>
        <div class="field">
          <label>Their Email</label>
          <input id="f-email" type="email" placeholder="email@district.org"/>
        </div>
      </div>
      <div class="field">
        <label>Details / Notes</label>
        <textarea id="f-details" rows="3" placeholder="Add notes, requirements, or context..."></textarea>
      </div>
      <div class="field">
        <label>Sub-Steps / Checklist</label>
        <div class="steps-list" id="steps-list"></div>
        <div class="step-add-row">
          <input id="step-input" placeholder="Add a step and press Enter"/>
          <button class="step-add-btn" id="btn-add-step">+</button>
        </div>
      </div>
      <label class="completed-toggle">
        <input type="checkbox" id="f-completed"/>
        <span>Mark as Completed</span>
      </label>
    </div>
    <div class="modal-footer">
      <div class="footer-left" id="modal-footer-left"></div>
      <div class="footer-right">
        <button class="btn btn-ghost" id="btn-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-save-task">Save Task</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
var STORAGE_KEY = 'music_coord_v4';
var CATS = {
  concerts:    { label:'Concerts & Events',      hex:'#818cf8' },
  budget:      { label:'Budget & Purchasing',     hex:'#38bdf8' },
  scheduling:  { label:'Scheduling & Rehearsals', hex:'#fbbf24' },
  maintenance: { label:'Instrument Maintenance',  hex:'#34d399' },
  bus:         { label:'Bus Requests',            hex:'#f472b6' },
  other:       { label:'Other',                   hex:'#94a3b8' }
};
var PRIS = {
  high: { label:'High', color:'#f87171', bg:'rgba(248,113,113,0.12)' },
  mid:  { label:'Mid',  color:'#fbbf24', bg:'rgba(251,191,36,0.12)'  },
  low:  { label:'Low',  color:'#34d399', bg:'rgba(52,211,153,0.12)'  }
};
var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ── STATE ──────────────────────────────────────────────────────────────────────
var tasks = [];
var currentView = 'Week';
var currentDate = new Date();
var editingId = null;
var modalSteps = [];

try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { tasks = []; }

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
}

function uid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function fmtDate(d) {
  if (!d) return '';
  var parts = d.split('-');
  var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── STATS ──────────────────────────────────────────────────────────────────────
function updateStats() {
  var td = todayStr();
  document.getElementById('stat-pending').textContent  = tasks.filter(function(t){ return !t.completed; }).length;
  document.getElementById('stat-high').textContent     = tasks.filter(function(t){ return !t.completed && t.priority==='high'; }).length;
  document.getElementById('stat-overdue').textContent  = tasks.filter(function(t){ return !t.completed && t.dueDate && t.dueDate < td; }).length;
}

// ── FILTERS ────────────────────────────────────────────────────────────────────
function getFiltered() {
  var fp = document.getElementById('filter-priority').value;
  var fc = document.getElementById('filter-category').value;
  var fs = document.getElementById('filter-status').value;
  var q  = document.getElementById('search').value.toLowerCase();
  return tasks.filter(function(t) {
    if (fp !== 'all' && t.priority !== fp) return false;
    if (fc !== 'all' && t.category !== fc) return false;
    if (fs === 'pending' && t.completed) return false;
    if (fs === 'done' && !t.completed) return false;
    if (q && t.title.toLowerCase().indexOf(q) === -1) return false;
    return true;
  });
}

// ── VIEW SWITCHING ─────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  ['Day','Week','Month','Year'].forEach(function(x) {
    var nb = document.getElementById('nav-'+x);
    var tb = document.getElementById('tab-'+x);
    if (nb) nb.className = 'nav-btn' + (x===v ? ' active' : '');
    if (tb) tb.className = 'view-tab' + (x===v ? ' active' : '');
  });
  renderView();
}

function renderView() {
  updateStats();
  var el = document.getElementById('content');
  if (currentView==='Day')   renderDay(el);
  if (currentView==='Week')  renderWeek(el);
  if (currentView==='Month') renderMonth(el);
  if (currentView==='Year')  renderYear(el);
}

// ── TASK CARD (DOM-based, no innerHTML onclick) ────────────────────────────────
function makeTaskCard(t) {
  var cat = CATS[t.category] || CATS.other;
  var pri = PRIS[t.priority] || PRIS.mid;
  var done = (t.steps||[]).filter(function(s){ return s.done; }).length;
  var total = (t.steps||[]).length;

  var card = document.createElement('button');
  card.className = 'task-card' + (t.completed ? ' done' : '');
  card.style.borderLeftColor = cat.hex;

  var top = document.createElement('div');
  top.className = 'tc-top';

  var title = document.createElement('div');
  title.className = 'tc-title';
  title.textContent = (t.completed ? '✓ ' : '') + t.title;

  var badge = document.createElement('div');
  badge.className = 'pri-badge';
  badge.style.color = pri.color;
  badge.style.background = pri.bg;
  badge.textContent = pri.label;

  top.appendChild(title);
  top.appendChild(badge);

  if (total > 0) {
    var pct = Math.round(done/total*100);
    var pb = document.createElement('div');
    pb.className = 'pct-badge';
    pb.style.color = pct===100 ? '#34d399' : '#6b7280';
    pb.textContent = pct + '%';
    top.appendChild(pb);
  }

  var meta = document.createElement('div');
  meta.className = 'tc-meta';

  var catSpan = document.createElement('span');
  catSpan.style.color = cat.hex;
  catSpan.textContent = cat.label;
  meta.appendChild(catSpan);

  if (t.assignee) {
    var aSpan = document.createElement('span');
    aSpan.textContent = '👤 ' + t.assignee;
    meta.appendChild(aSpan);
  }
  if (t.dueDate) {
    var dSpan = document.createElement('span');
    dSpan.textContent = '📅 ' + fmtDate(t.dueDate);
    meta.appendChild(dSpan);
  }
  if (total > 0) {
    var sSpan = document.createElement('span');
    sSpan.textContent = '☑ ' + done + '/' + total;
    meta.appendChild(sSpan);
  }

  card.appendChild(top);
  card.appendChild(meta);

  if (t.details) {
    var det = document.createElement('div');
    det.className = 'tc-details';
    det.textContent = t.details;
    card.appendChild(det);
  }

  card.addEventListener('click', function() { openModal(t.id); });
  return card;
}

function makeTaskPill(t) {
  var cat = CATS[t.category] || CATS.other;
  var btn = document.createElement('button');
  btn.className = 'task-pill' + (t.completed ? ' done' : '');
  btn.style.background = cat.hex;
  btn.textContent = (t.completed ? '✓ ' : '') + t.title;
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    openModal(t.id);
  });
  return btn;
}

// ── DAY VIEW ───────────────────────────────────────────────────────────────────
function renderDay(el) {
  var ds = currentDate.toISOString().slice(0,10);
  var label = currentDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var ft = getFiltered().filter(function(t){ return t.dueDate===ds; });
  ft.sort(function(a,b){ return ['high','mid','low'].indexOf(a.priority) - ['high','mid','low'].indexOf(b.priority); });

  el.innerHTML = '';

  var hdr = makeViewHeader(label,
    function(){ currentDate.setDate(currentDate.getDate()-1); renderView(); },
    function(){ currentDate.setDate(currentDate.getDate()+1); renderView(); },
    function(){ currentDate=new Date(); renderView(); },
    '‹ Prev', 'Next ›', 'Today'
  );
  el.appendChild(hdr);

  var wrap = document.createElement('div');
  wrap.style.maxWidth = '680px';

  if (ft.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'day-empty';
    empty.innerHTML = '<div class="big-icon">🎵</div><p>No tasks due today</p>';
    var addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.style.marginTop = '16px';
    addBtn.textContent = '+ Add Task';
    addBtn.addEventListener('click', function(){ openModal(null, ds); });
    empty.appendChild(addBtn);
    wrap.appendChild(empty);
  } else {
    ft.forEach(function(t){ wrap.appendChild(makeTaskCard(t)); });
    var addBtn2 = document.createElement('button');
    addBtn2.className = 'add-day-btn';
    addBtn2.textContent = '+ Add Task for This Day';
    addBtn2.addEventListener('click', function(){ openModal(null, ds); });
    wrap.appendChild(addBtn2);
  }
  el.appendChild(wrap);
}

// ── WEEK VIEW ──────────────────────────────────────────────────────────────────
function renderWeek(el) {
  var start = new Date(currentDate);
  start.setDate(currentDate.getDate() - currentDate.getDay());
  var days = [];
  for (var i=0; i<7; i++) {
    var d = new Date(start);
    d.setDate(start.getDate()+i);
    days.push(d);
  }
  var td = todayStr();
  var label = 'Week of ' + days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
              ' \u2013 ' + days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  var ft = getFiltered();

  el.innerHTML = '';
  var hdr = makeViewHeader(label,
    function(){ currentDate.setDate(currentDate.getDate()-7); renderView(); },
    function(){ currentDate.setDate(currentDate.getDate()+7); renderView(); },
    function(){ currentDate=new Date(); renderView(); },
    '‹ Prev', 'Next ›', 'This Week'
  );
  el.appendChild(hdr);

  var grid = document.createElement('div');
  grid.className = 'week-grid';

  days.forEach(function(d) {
    var ds = d.toISOString().slice(0,10);
    var isToday = ds === td;
    var dt = ft.filter(function(t){ return t.dueDate===ds; });

    var cell = document.createElement('div');
    cell.className = 'week-day' + (isToday ? ' today' : '');

    var dname = document.createElement('div');
    dname.className = 'week-day-name';
    dname.textContent = DAYS[d.getDay()];

    var dnum = document.createElement('div');
    dnum.className = 'week-day-num';
    dnum.textContent = d.getDate();

    var dtasks = document.createElement('div');
    dtasks.className = 'week-tasks';
    dt.forEach(function(t){ dtasks.appendChild(makeTaskPill(t)); });

    var addBtn = document.createElement('button');
    addBtn.className = 'week-add';
    addBtn.textContent = '+';
    (function(dateStr){ addBtn.addEventListener('click', function(){ openModal(null, dateStr); }); })(ds);

    cell.appendChild(dname);
    cell.appendChild(dnum);
    cell.appendChild(dtasks);
    cell.appendChild(addBtn);
    grid.appendChild(cell);
  });

  el.appendChild(grid);
}

// ── MONTH VIEW ─────────────────────────────────────────────────────────────────
function renderMonth(el) {
  var y = currentDate.getFullYear();
  var m = currentDate.getMonth();
  var first = new Date(y,m,1).getDay();
  var total = new Date(y,m+1,0).getDate();
  var td = todayStr();
  var label = new Date(y,m).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var ft = getFiltered();

  el.innerHTML = '';
  var hdr = makeViewHeader(label,
    function(){ currentDate.setMonth(currentDate.getMonth()-1); renderView(); },
    function(){ currentDate.setMonth(currentDate.getMonth()+1); renderView(); },
    function(){ currentDate=new Date(); renderView(); },
    '‹', '›', 'Today'
  );
  el.appendChild(hdr);

  var dowRow = document.createElement('div');
  dowRow.className = 'month-grid-header';
  DAYS.forEach(function(d){
    var span = document.createElement('div');
    span.className = 'month-dow';
    span.textContent = d;
    dowRow.appendChild(span);
  });
  el.appendChild(dowRow);

  var grid = document.createElement('div');
  grid.className = 'month-grid';

  for (var i=0; i<first; i++) {
    var empty = document.createElement('div');
    empty.className = 'month-cell empty';
    grid.appendChild(empty);
  }

  for (var day=1; day<=total; day++) {
    var ds = y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var isToday = ds === td;
    var dt = ft.filter(function(t){ return t.dueDate===ds; });

    var cell = document.createElement('div');
    cell.className = 'month-cell' + (isToday ? ' today' : '');

    var num = document.createElement('div');
    num.className = 'month-num';
    num.textContent = day;
    cell.appendChild(num);

    dt.slice(0,3).forEach(function(t){ cell.appendChild(makeTaskPill(t)); });
    if (dt.length > 3) {
      var more = document.createElement('div');
      more.style.cssText = 'font-size:9px;color:var(--muted)';
      more.textContent = '+' + (dt.length-3) + ' more';
      cell.appendChild(more);
    }

    (function(dateStr){
      cell.addEventListener('click', function(e){
        if (e.target === cell || e.target === num || e.target === more) {
          openModal(null, dateStr);
        }
      });
    })(ds);

    grid.appendChild(cell);
  }
  el.appendChild(grid);
}

// ── YEAR/ALL VIEW ──────────────────────────────────────────────────────────────
function renderYear(el) {
  var ft = getFiltered().slice().sort(function(a,b){
    if (!a.dueDate) return 1;
    if (!b.dueDate) return -1;
    return a.dueDate.localeCompare(b.dueDate);
  });

  el.innerHTML = '';
  var hdr = document.createElement('div');
  hdr.className = 'view-header';
  var title = document.createElement('div');
  title.className = 'view-title';
  title.textContent = 'All Tasks';
  var count = document.createElement('span');
  count.style.cssText = 'font-size:14px;color:var(--muted);font-family:"DM Sans",sans-serif;font-weight:400';
  count.textContent = ' \u2014 ' + ft.length + ' tasks';
  title.appendChild(count);
  hdr.appendChild(title);
  el.appendChild(hdr);

  if (ft.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'year-empty';
    empty.innerHTML = '<div style="font-size:48px;margin-bottom:12px">📋</div><p>No tasks match your filters</p>';
    el.appendChild(empty);
    return;
  }

  var wrap = document.createElement('div');
  wrap.style.maxWidth = '720px';
  ft.forEach(function(t){ wrap.appendChild(makeTaskCard(t)); });
  el.appendChild(wrap);
}

// ── HELPER: VIEW HEADER ────────────────────────────────────────────────────────
function makeViewHeader(label, onPrev, onNext, onToday, prevLabel, nextLabel, todayLabel) {
  var hdr = document.createElement('div');
  hdr.className = 'view-header';

  var prev = document.createElement('button');
  prev.className = 'nav-arrow';
  prev.textContent = prevLabel;
  prev.addEventListener('click', onPrev);

  var title = document.createElement('div');
  title.className = 'view-title';
  title.textContent = label;

  var next = document.createElement('button');
  next.className = 'nav-arrow';
  next.textContent = nextLabel;
  next.addEventListener('click', onNext);

  var today = document.createElement('button');
  today.className = 'today-link';
  today.textContent = todayLabel;
  today.addEventListener('click', onToday);

  hdr.appendChild(prev);
  hdr.appendChild(title);
  hdr.appendChild(next);
  hdr.appendChild(today);
  return hdr;
}

// ── MODAL ──────────────────────────────────────────────────────────────────────
function openModal(id, prefillDate) {
  editingId = id || null;
  modalSteps = [];
  var t = id ? tasks.find(function(x){ return x.id===id; }) : null;

  document.getElementById('modal-title').textContent = t ? 'Edit Task' : 'New Task';
  document.getElementById('f-title').value      = t ? (t.title||'') : '';
  document.getElementById('f-due').value         = t ? (t.dueDate||'') : (prefillDate || todayStr());
  document.getElementById('f-priority').value    = t ? (t.priority||'mid') : 'mid';
  document.getElementById('f-category').value    = t ? (t.category||'other') : 'other';
  document.getElementById('f-assignee').value    = t ? (t.assignee||'') : '';
  document.getElementById('f-email').value       = t ? (t.assigneeEmail||'') : '';
  document.getElementById('f-details').value     = t ? (t.details||'') : '';
  document.getElementById('f-completed').checked = t ? (t.completed||false) : false;
  modalSteps = t ? (t.steps||[]).map(function(s){ return {id:s.id,text:s.text,done:s.done}; }) : [];

  renderSteps();

  var fl = document.getElementById('modal-footer-left');
  fl.innerHTML = '';
  if (t) {
    var delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete';
    delBtn.addEventListener('click', deleteTask);
    fl.appendChild(delBtn);

    var gmailLink = buildGmailLink(t);
    var gmailBtn = document.createElement('a');
    gmailBtn.className = 'btn btn-gmail';
    gmailBtn.href = gmailLink;
    gmailBtn.target = '_blank';
    gmailBtn.textContent = '📧 Send Reminder';
    fl.appendChild(gmailBtn);
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('f-title').focus(); }, 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderSteps() {
  var el = document.getElementById('steps-list');
  el.innerHTML = '';
  modalSteps.forEach(function(s, i) {
    var row = document.createElement('div');
    row.className = 'step-item';

    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = s.done;
    (function(idx){ cb.addEventListener('change', function(){ modalSteps[idx].done = this.checked; renderSteps(); }); })(i);

    var txt = document.createElement('span');
    txt.className = 'step-text' + (s.done ? ' done' : '');
    txt.textContent = s.text;

    var del = document.createElement('button');
    del.className = 'step-del';
    del.textContent = '✕';
    (function(idx){ del.addEventListener('click', function(){ modalSteps.splice(idx,1); renderSteps(); }); })(i);

    row.appendChild(cb);
    row.appendChild(txt);
    row.appendChild(del);
    el.appendChild(row);
  });
}

function addStep() {
  var inp = document.getElementById('step-input');
  if (!inp.value.trim()) return;
  modalSteps.push({id:uid(), text:inp.value.trim(), done:false});
  inp.value = '';
  renderSteps();
  inp.focus();
}

function saveTask() {
  var title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Task title is required.'); return; }
  var t = {
    id:            editingId || uid(),
    title:         title,
    dueDate:       document.getElementById('f-due').value,
    priority:      document.getElementById('f-priority').value,
    category:      document.getElementById('f-category').value,
    assignee:      document.getElementById('f-assignee').value.trim(),
    assigneeEmail: document.getElementById('f-email').value.trim(),
    details:       document.getElementById('f-details').value.trim(),
    completed:     document.getElementById('f-completed').checked,
    steps:         modalSteps.slice()
  };
  if (editingId) {
    tasks = tasks.map(function(x){ return x.id===editingId ? t : x; });
  } else {
    tasks.push(t);
  }
  save();
  closeModal();
  renderView();
}

function deleteTask() {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(function(x){ return x.id!==editingId; });
  save();
  closeModal();
  renderView();
}

function buildGmailLink(t) {
  var cat = (CATS[t.category] && CATS[t.category].label) || t.category;
  var pri = (PRIS[t.priority] && PRIS[t.priority].label) || t.priority;
  var sub = encodeURIComponent('Reminder: ' + t.title + ' \u2014 Due ' + fmtDate(t.dueDate));
  var bodyLines = [
    'Hi' + (t.assignee ? ' ' + t.assignee : '') + ',',
    '',
    'This is a reminder about the following task:',
    '',
    '\uD83D\uDCCB Task: ' + t.title,
    '\uD83D\uDCC5 Due Date: ' + fmtDate(t.dueDate),
    '\uD83C\uDFF7\uFE0F Category: ' + cat,
    '\u26A1 Priority: ' + pri.toUpperCase(),
    '',
    t.details ? 'Details:\n' + t.details : '',
    '',
    'Please ensure this is completed on time.',
    '',
    '\u2014 Music Department Coordinator'
  ];
  var body = encodeURIComponent(bodyLines.join('\n'));
  var to = encodeURIComponent(t.assigneeEmail || '');
  return 'https://mail.google.com/mail/?view=cm&fs=1&to=' + to + '&su=' + sub + '&body=' + body;
}

// ── EVENT LISTENERS ────────────────────────────────────────────────────────────
document.getElementById('btn-new-sidebar').addEventListener('click', function(){ openModal(); });
document.getElementById('btn-new-top').addEventListener('click', function(){ openModal(); });
document.getElementById('btn-modal-close').addEventListener('click', closeModal);
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save-task').addEventListener('click', saveTask);
document.getElementById('btn-add-step').addEventListener('click', addStep);

document.getElementById('step-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') { e.preventDefault(); addStep(); }
});

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

document.getElementById('nav-Day').addEventListener('click', function(){ setView('Day'); });
document.getElementById('nav-Week').addEventListener('click', function(){ setView('Week'); });
document.getElementById('nav-Month').addEventListener('click', function(){ setView('Month'); });
document.getElementById('nav-Year').addEventListener('click', function(){ setView('Year'); });
document.getElementById('tab-Day').addEventListener('click', function(){ setView('Day'); });
document.getElementById('tab-Week').addEventListener('click', function(){ setView('Week'); });
document.getElementById('tab-Month').addEventListener('click', function(){ setView('Month'); });
document.getElementById('tab-Year').addEventListener('click', function(){ setView('Year'); });

document.getElementById('search').addEventListener('input', renderView);
document.getElementById('filter-priority').addEventListener('change', renderView);
document.getElementById('filter-category').addEventListener('change', renderView);
document.getElementById('filter-status').addEventListener('change', renderView);

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeModal();
});

// ── INIT ───────────────────────────────────────────────────────────────────────
renderView();

})();
</script>
